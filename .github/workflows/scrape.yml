name: Scrape Clan Leaderboard
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: scrape-leaderboard
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false       # one class timing out shouldn't cancel the others
      matrix:
        class_index: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright browser
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Run scraper for this class
        working-directory: scraper
        run: node scrape-one.js ${{ matrix.class_index }}

      - name: Upload class result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-part-${{ matrix.class_index }}
          path: data/leaderboard-*.json
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload debug HTML on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-${{ matrix.class_index }}
          path: data/debug-*.html
          if-no-files-found: ignore
          retention-days: 3

  merge:
    needs: scrape
    if: always()             # still try to merge even if one class job failed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all class results
        uses: actions/download-artifact@v4
        with:
          pattern: leaderboard-part-*
          path: parts
          merge-multiple: true

      - name: Merge into leaderboard.json
        working-directory: scraper
        run: node merge.js ../parts

      - name: Commit updated data
        run: |
          git config user.name "leaderboard-bot"
          git config user.email "actions@users.noreply.github.com"

          cp data/leaderboard.json /tmp/leaderboard.json.new

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/leaderboard.json.new data/leaderboard.json
            git add data/leaderboard.json
            if git diff --staged --quiet; then
              echo "No changes to commit."
              exit 0
            fi
            git commit -m "Update leaderboard data"
            if git push origin main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, retrying..."
            sleep $((attempt * 3))
          done

          echo "Failed to push after 5 attempts"
          exit 1
