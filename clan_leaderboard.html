<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clan Leaderboard · hordes.io</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-top:#0a1a0d;--bg-bot:#020503;--surface:#0e1f12;--s2:#13291a;--border:#1d3a23;
  --accent:#7CFC4A;--accent2:#9aff5c;--text:#f0fff2;--muted:#7a9582;
  --sss-c:#f0c7ff;--sss-bg:#2d1040;--ss-c:#bfdbfe;--ss-bg:#0f2040;
  --s-c:#bbf7d0;--s-bg:#052816;--ap-c:#fed7aa;--ap-bg:#2d1700;
  --a-c:#fde68a;--a-bg:#2d1f00;--am-c:#fca5a5;--am-bg:#2d0a0a;
  --bp-c:#e2e8f0;--bp-bg:#1e2535;--b-c:#cbd5e1;--b-bg:#1a2030;
  --gold:#ffd700;--silver:#d8dee8;--bronze:#cd7f32;
}
#bgVideo{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;border:none;pointer-events:none;transform:scale(1.5);}
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
  background:radial-gradient(circle at 50% -10%, rgba(10,40,15,.55) 0%, rgba(2,10,5,.75) 60%, rgba(2,5,3,.9) 100%);
}
body{color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
.wrap{max-width:660px;margin:0 auto;padding:40px 20px 50px}
header{display:flex;align-items:baseline;justify-content:center;gap:10px;padding:0 0 20px}
header h1{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:30px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text);
  text-shadow:0 0 18px rgba(124,252,74,.45), 0 0 2px rgba(124,252,74,.8);
}
header h1::before{content:'⚔ ';color:var(--accent)}
.tabs{display:flex;gap:6px;justify-content:center;padding:0 0 18px;flex-wrap:wrap}
.tab{
  padding:7px 16px;border:1px solid var(--border);border-radius:999px;cursor:pointer;
  font-size:12.5px;font-weight:600;color:var(--muted);
  background:rgba(20,60,30,.25);backdrop-filter:blur(10px);
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.tab img{width:14px;height:14px;object-fit:contain;opacity:.5}
.tab.active{background:linear-gradient(135deg,rgba(124,252,74,.30),rgba(124,252,74,.10));border-color:var(--accent);color:var(--accent2);box-shadow:0 0 14px rgba(124,252,74,.25)}
.tab.active img{opacity:1}
.content{
  padding:4px;
  background:linear-gradient(180deg, rgba(124,252,74,.10), rgba(10,40,18,.35) 100%);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:14px;
  box-shadow:0 20px 60px -20px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);
  overflow:hidden;
}
.pane{display:none}.pane.active{display:block}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead tr{border-bottom:1px solid var(--border)}
th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:11px 14px 9px}
th.r{text-align:right}
col.col-rank{width:50px}col.col-cls{width:90px}col.col-overall{width:90px}col.col-score{width:90px}
tbody tr.main-row{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
tbody tr.main-row:nth-child(4n+1){background:rgba(255,255,255,.02)}
tbody tr.main-row:hover{background:rgba(124,252,74,.12)}
tbody tr.detail-row{border-bottom:1px solid var(--border);display:none;background:rgba(0,0,0,.25)}
tbody tr.detail-row.open{display:table-row}
tbody tr.detail-row td{padding:12px 18px 16px}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 14px}
.detail-item{display:flex;flex-direction:column;gap:3px}
.detail-label{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.detail-val{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--text)}
.chevron{display:inline-block;margin-left:5px;font-size:9px;color:var(--muted);transition:transform .15s}
tr.main-row.expanded .chevron{transform:rotate(90deg);color:var(--accent2)}
td{padding:11px 14px;vertical-align:middle}
td.r{text-align:right}
.rank-badge{
  width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);
}
.rank-badge.rank-1{background:linear-gradient(135deg,var(--gold),#a87900);color:#1d1400;box-shadow:0 0 14px rgba(255,215,0,.55)}
.rank-badge.rank-2{background:linear-gradient(135deg,var(--silver),#8b95a3);color:#10131a;box-shadow:0 0 10px rgba(216,222,232,.35)}
.rank-badge.rank-3{background:linear-gradient(135deg,var(--bronze),#7a4a1f);color:#1a0f00;box-shadow:0 0 10px rgba(205,127,50,.4)}
.rank-badge.rank-n{background:rgba(124,252,74,.12);border:1px solid rgba(124,252,74,.35);color:var(--accent2)}
.rank-badge.rank-f{background:rgba(229,90,43,.15);border:1px solid rgba(229,90,43,.4);color:#ff9d70}
.pname{font-weight:700;color:var(--text);font-size:13.5px}
.global{font-size:10.5px;color:var(--muted);display:block;margin-top:1px}
.score-val{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--accent2);text-shadow:0 0 10px rgba(124,252,74,.45)}
.cls-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.cls-tag img{width:14px;height:14px;object-fit:contain}
.empty{color:var(--muted);font-style:italic;padding:30px 0;text-align:center;font-size:13px}
.unranked td{opacity:.6}
.unranked{cursor:default !important}
.tier{display:inline-block;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.04em;padding:2px 7px;border-radius:4px;min-width:30px;text-align:center}
.t-SSS{color:var(--sss-c);background:var(--sss-bg)}.t-SS{color:var(--ss-c);background:var(--ss-bg)}
.t-S{color:var(--s-c);background:var(--s-bg)}.t-Ap{color:var(--ap-c);background:var(--ap-bg)}
.t-A{color:var(--a-c);background:var(--a-bg)}.t-Am{color:var(--am-c);background:var(--am-bg)}
.t-Bp{color:var(--bp-c);background:var(--bp-bg)}.t-B{color:var(--b-c);background:var(--b-bg)}
.t-x{color:var(--muted);background:rgba(13,22,16,.6)}
.note{font-size:11px;color:var(--muted);margin:0;padding:10px 14px;background:rgba(13,41,26,.5);border-top:1px solid var(--border)}
.note button{background:none;border:1px solid var(--border);color:var(--accent2);font-size:10.5px;padding:2px 8px;border-radius:999px;cursor:pointer;margin-left:4px}
</style>
</head>
<body>

<iframe id="bgVideo" src="https://www.youtube.com/embed/lxJf3b2_SL0?autoplay=1&mute=1&loop=1&playlist=lxJf3b2_SL0&controls=0&showinfo=0&rel=0&disablekb=1&modestbranding=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

<div class="wrap">
<header>
  <h1>Clan Leaderboard</h1>
</header>

<div class="tabs">
  <div class="tab all active" onclick="switchTab('all')">All</div>
  <div class="tab warrior" onclick="switchTab('warrior')">
    <img src="https://cdn.jsdelivr.net/gh/2f147f0487a9fe5b/8a086bf1a8e31f1b/data/ui/classes/0.webp" alt=""/> Warrior
  </div>
  <div class="tab mage" onclick="switchTab('mage')">
    <img src="https://cdn.jsdelivr.net/gh/2f147f0487a9fe5b/8a086bf1a8e31f1b/data/ui/classes/1.webp" alt=""/> Mage
  </div>
  <div class="tab archer" onclick="switchTab('archer')">
    <img src="https://cdn.jsdelivr.net/gh/2f147f0487a9fe5b/8a086bf1a8e31f1b/data/ui/classes/2.webp" alt=""/> Archer
  </div>
  <div class="tab shaman" onclick="switchTab('shaman')">
    <img src="https://cdn.jsdelivr.net/gh/2f147f0487a9fe5b/8a086bf1a8e31f1b/data/ui/classes/3.webp" alt=""/> Shaman
  </div>
</div>

<div class="content">
  <div id="pane-all"     class="pane active"></div>
  <div id="pane-warrior" class="pane"></div>
  <div id="pane-mage"    class="pane"></div>
  <div id="pane-archer"  class="pane"></div>
  <div id="pane-shaman"  class="pane"></div>
</div>
</div>

<script>
const ROSTER = [
  'Smorgon',
  'whiteflavored',
  'woogs',
  'KroVynArc',
  'nizar12300334',
  'killthevg',
  'Temperment',
  'carson107',
  'TheSunXIX',
  'KaisieKanade',
  'RyuuLion',
  'RuiDeng',
  'littleshoes3',
  'Plagaa',
  'ParadoxPVP',
  'Txy2',
  'MissAlva',
  'Skullpine5',
  'JorteX',
  'Scarearch',
  'flameleador',
  'sixseeeveeeeenn',
  'CrzyMnky',
  'LucieLongshot',
  'Vaylor',
  'Aryeyaepiol',
  'neunmalklug',
  'Kiemy',
  'traitorofvg',
  'Dukaan',
  'Tarkuk',
  'potassgg7',
  'knighytwriter',
  'Nosoylaze',
  'Arcynox',
  'robinakuriwator',
  'catskratch',
  'Heisrunsham',
  'Leedot',
  'Tayeo',
  'taco12blmagician',
  'Kryonn',
  'xN0TxJ03Lx',
  'fayri',
  'CrocCharm',
  'troll35',
  'Witchling',
  'KroVynArc',
  'Rayama',
  'Zintrothen',
  'GrubMother',
  '7NationArmy',
  'Zortover',
  'Yaphytwo',
  'LOlilOLlo',
  'starguy23',
  'tanksword',
  'Aurae',
  '1048',
  'UZI9mm',
  'Stonebender',
  'inkyboy',
  'VIolV',
  'Shihai',
  'Connection',
  'Nelst',
  'LadySix',
  'MissAlva'
];const DATA_URL = 'https://raw.githubusercontent.com/GiveMeTheCookie/CROC-tier-LB/refs/heads/main/data/leaderboard.json';

const ICONS = {
  warrior:'https://cdn.jsdelivr.net/gh/2f147f0487a9fe5b/8a086bf1a8e31f1b/data/ui/classes/0.webp',
  mage:   'https://cdn.jsdelivr.net/gh/2f147f0487a9fe5b/8a086bf1a8e31f1b/data/ui/classes/1.webp',
  archer: 'https://cdn.jsdelivr.net/gh/2f147f0487a9fe5b/8a086bf1a8e31f1b/data/ui/classes/2.webp',
  shaman: 'https://cdn.jsdelivr.net/gh/2f147f0487a9fe5b/8a086bf1a8e31f1b/data/ui/classes/3.webp',
};
const TC = {SSS:'t-SSS',SS:'t-SS',S:'t-S','A+':'t-Ap',A:'t-A','A-':'t-Am','B+':'t-Bp',B:'t-B'};
const badge = t => t ? `<span class="tier ${TC[t]||'t-x'}">${t}</span>` : `<span class="tier t-x">—</span>`;

let MEMBERS = ROSTER.map(name => ({ name, cls:null, rank:null, score:null }));
let lastError = null;

async function loadAll() {
  lastError = null;
  try {
    const res = await fetch(DATA_URL + (DATA_URL.includes('?') ? '&' : '?') + 't=' + Date.now());
    const data = await res.json();
    if (!data.ok) throw new Error(data.note || data.error || 'Scraper has not produced data yet.');
    MEMBERS = ROSTER.map(name => {
      const hit = data.rows.find(r => r.name.toLowerCase() === name.toLowerCase());
      return hit ? { ...hit, name } : { name, cls:null, rank:null, score:null };
    });
  } catch (err) {
    lastError = err.message || String(err);
  }
  render();
}

function rankBadge(n) {
  if (n === 'F') return `<span class="rank-badge rank-f">F</span>`;
  const cls = n === 1 ? 'rank-1' : n === 2 ? 'rank-2' : n === 3 ? 'rank-3' : 'rank-n';
  return `<span class="rank-badge ${cls}">${n}</span>`;
}

function toggleRow(el) {
  el.classList.toggle('expanded');
  el.nextElementSibling.classList.toggle('open');
}

function makeTable(rows, showClass) {
  if (!rows.length) return `<div class="empty">No members in this class yet.</div>`;
  const TIER_ORDER = ['SSS','SS','S+','S','S-','A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','E+','E','E-','F'];
  const tierRank = t => { const i = TIER_ORDER.indexOf(t); return i === -1 ? TIER_ORDER.length : i; };
  const withScore = rows.filter(r => r.score !== null && !Number.isNaN(r.score)).sort((a,b)=>(tierRank(a.overall)-tierRank(b.overall)) || (b.score-a.score));
  const noScore = rows.filter(r => !(r.score !== null && !Number.isNaN(r.score))).sort((a,b)=>a.name.localeCompare(b.name));
  const sorted = [...withScore, ...noScore];
  const colCount = showClass ? 4 : 3;
  let h = `<table>
    <colgroup><col class="col-rank">${showClass?'<col>':''}<col class="col-overall"><col class="col-score"></colgroup>
    <thead><tr>
    <th>#</th><th>Player</th>
    ${showClass?'<th>Class</th>':''}
    <th>Overall</th><th class="r">Score</th>
  </tr></thead><tbody>`;
  let ranked = 0;
  sorted.forEach(p => {
    const hasData = p.score !== null && !Number.isNaN(p.score);
    if(hasData) ranked++;
    const cls = p.cls || 'warrior';
    h += `<tr class="main-row ${hasData?'':'unranked'}" ${hasData ? `onclick="toggleRow(this)"` : ''}>
      <td>${hasData ? rankBadge(ranked) : rankBadge('F')}</td>
      <td>
        <div class="pname">${p.name}${hasData ? '<span class="chevron">▶</span>' : ''}</div>
        <span class="global">${hasData ? `#${p.rank}` : 'Not in scrape'}</span>
      </td>
      ${showClass ? `<td><span class="cls-tag">${p.cls?`<img src="${ICONS[cls]}" alt=""/>${cls}`:'unknown'}</span></td>` : ''}
      <td>${badge(p.overall)}</td>
      <td class="r">${hasData ? `<span class="score-val">${p.score.toFixed(2)}</span>` : '—'}</td>
    </tr>
    <tr class="detail-row">
      <td colspan="${colCount}">
        <div class="detail-grid">
          <div class="detail-item"><span class="detail-label">DPS</span><span class="detail-val">${(p.dps && !Number.isNaN(p.dps)) ? p.dps : '—'}</span></div>
          <div class="detail-item"><span class="detail-label">eHP</span><span class="detail-val">${p.ehp && !Number.isNaN(p.ehp) ? p.ehp.toLocaleString() : '—'}</span></div>
          <div class="detail-item"><span class="detail-label">Tank</span><span class="detail-val">${badge(p.tank)}</span></div>
          <div class="detail-item"><span class="detail-label">Hybrid</span><span class="detail-val">${badge(p.hybrid)}</span></div>
          <div class="detail-item"><span class="detail-label">DPS Tier</span><span class="detail-val">${badge(p.dpst)}</span></div>
          <div class="detail-item"><span class="detail-label">Build</span><span class="detail-val" style="font-size:11px"><a href="https://onex.shturmovi.cc/playground?b=${encodeURIComponent(p.name)}" target="_blank" style="color:var(--accent2);text-decoration:none">View →</a></span></div>
        </div>
      </td>
    </tr>`;
  });
  h += '</tbody></table>';
  return h;
}

function render() {
  const unknown = MEMBERS.filter(m => !m.cls);
  let unknownNote = '';
  if (lastError) {
    unknownNote = `<p class="note">⚠ ${lastError} <button onclick="loadAll()">Retry</button></p>`;
  } else if (unknown.length) {
    unknownNote = `<p class="note">⚠ ${unknown.length} member(s) not found in latest scrape — shown with rank F.</p>`;
  }
  ['warrior','mage','archer','shaman'].forEach(cls => {
    const rows = MEMBERS.filter(m => m.cls === cls);
    document.getElementById(`pane-${cls}`).innerHTML = makeTable(rows, false) + (cls==='warrior' ? unknownNote : '');
  });
  document.getElementById('pane-all').innerHTML = makeTable(MEMBERS, true) + unknownNote;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab.${tab}`).classList.add('active');
  document.getElementById(`pane-${tab}`).classList.add('active');
}

render();
loadAll();
</script>
</body>
</html>
